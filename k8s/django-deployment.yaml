apiVersion: apps/v1
kind: Deployment

metadata:
  name: employee-api
  namespace: employee-management

spec:
  replicas: 2

  selector:
    matchLabels:
      app: employee-api

  template:
    metadata:
      labels:
        app: employee-api

    spec:
      containers:
        - name: employee-api

          image: employee-management-api:latest
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 8000

          envFrom:
            - configMapRef:
                name: employee-config

            - secretRef:
                name: employee-secret
              
          command:
            - sh
            - -c

          args:
            -
              python manage.py migrate &&
              python manage.py runserver 0.0.0.0:8000